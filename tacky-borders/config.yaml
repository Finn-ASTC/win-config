watch_config_changes: True
enable_logging: True
rendering_backend: V2

global:
  border_width: 3
  border_offset: 0
  border_radius: Auto
  border_z_order: AboveWindow
  follow_native_border: True
  initialize_delay: 200
  unminimize_delay: 150

  # 活动/非活动窗口边框颜色
  active_color:
    colors: ["#FF8AD4", "#FF7BC4"]
    direction: 45deg
  inactive_color:
    colors: ["#FF54CC0F", "#FF43BA1B"]
    direction:
      start: [0.0, 1.0]
      end: [1.0, 0.0]

  # 动画: 螺旋 + 淡入淡出
  animations:
    active:
      - type: ReverseSpiral
        duration: 1800
        easing: Linear
      - type: Fade
        duration: 300
        easing: EaseInOutQuad
    inactive:
      - type: Spiral
        duration: 1800
        easing: Linear
      - type: Fade
        duration: 600
        easing: EaseInOutQuad
    fps: 60
    enabled: true

  # 效果: 阴影 + 发光
  effects:
    active:
      - type: Shadow
        blur: 15.0
        spread: 0.5
        opacity: 0.5
        translation: { x: -13, y: 13 }
      - type: Glow
        blur: 20.0
        spread: 1.0
        opacity: 1.0
    inactive:
      - type: Shadow
        blur: 12.0
        spread: 0.5
        opacity: 0.5
        translation: { x: -13, y: 13 }
      - type: Glow
        blur: 0.0
        spread: 0.0
        opacity: 1.0
    enabled: true

# ---- 窗口排除规则 ----
window_rules:
  - match: Class
    name: "Windows.UI.Core.CoreWindow"
    enabled: False
  - match: Class
    name: "XamlExplorerHostIslandWindow"
    enabled: False
  - match: Process
    name: "tacky-borders"
    enabled: False
  - match: Process
    name: "zebar"
    enabled: False
  - match: Title
    name: "komorebi-bar"
    enabled: False
  - match: Title
    name: "keyviz"
    enabled: False
  - match: Title
    name: "Picture-in-Picture"
    enabled: False
  - match: Process
    name: "seelen-ui"
    enabled: False
  - match: Process
    name: "Yasb Status Bar"
    enabled: True
