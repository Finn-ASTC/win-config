add_newline = true

format = """
$cmd_duration $directory$git_branch
  $character"""

[fill]
symbol = '-'
style = 'fg:#EEA0E5'

[character]
success_symbol = "[о©ұ пҒӢ](bold fg:#FFC0F5)"
error_symbol = "[пҖҚ пҒӢ](bold fg:#FF6B81)"

[package]
disabled = true

[git_branch]
style = "bg:#C858B2"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:#C858B2)[$symbol $branch(:$remote_branch)](fg:#0C060C bg:#C858B2)[оӮҙ ](bold fg:#C858B2)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](purple)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format = "[вҖў$hostname](bg:#A83896 bold fg:#0C060C)[оӮҙ](bold fg:#A83896)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:#A83896 fg:#0C060C"
style_root = "red bold"
format = "[оӮ¶](bold fg:#A83896)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:#D268B8 fg:#0C060C"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:#D268B8)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:#D268B8)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:#FF9CF0)[у°Әў $duration](bold bg:#FF9CF0 fg:#0C060C)[оӮҙ](bold fg:#FF9CF0)'
